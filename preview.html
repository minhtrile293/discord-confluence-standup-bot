<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Trang HTML mẫu để kiểm tra GitHub Pages" />
  <title>GitHub Pages Test</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg, #f6f8fa, #dbeafe);
      color: #1f2937;
    }

    .container {
      width: 100%;
      max-width: 720px;
      padding: 40px;
      text-align: center;
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.12);
    }

    .badge {
      display: inline-block;
      margin-bottom: 20px;
      padding: 8px 14px;
      border-radius: 999px;
      background: #dcfce7;
      color: #166534;
      font-size: 14px;
      font-weight: 700;
    }

    h1 {
      margin-bottom: 16px;
      font-size: clamp(32px, 6vw, 52px);
    }

    p {
      margin-bottom: 28px;
      font-size: 18px;
      line-height: 1.6;
      color: #4b5563;
    }

    button {
      padding: 12px 22px;
      border: none;
      border-radius: 10px;
      background: #2563eb;
      color: white;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }

    button:hover {
      background: #1d4ed8;
    }

    #message {
      min-height: 24px;
      margin-top: 20px;
      font-weight: 700;
      color: #166534;
    }

    footer {
      margin-top: 32px;
      font-size: 14px;
      color: #9ca3af;
    }
  </style>
</head>

<body>
  <main class="container">
    <span class="badge">GitHub Pages đang hoạt động</span>

    <h1>Xin chào GitHub Pages!</h1>

    <p>
      Đây là file <strong>index.html</strong> mẫu dùng để kiểm tra việc deploy
      website tĩnh miễn phí bằng GitHub Pages.
    </p>

    <button id="testButton" type="button">Kiểm tra JavaScript</button>

    <div id="message" aria-live="polite"></div>

    <footer>
      © 2026 GitHub Pages Test
    </footer>
  </main>

  <script>
    const button = document.getElementById("testButton");
    const message = document.getElementById("message");

    button.addEventListener("click", () => {
      message.textContent = "JavaScript hoạt động bình thường!";
    });
  </script>
</body>
</html>
